services:
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: washworld_flask
    depends_on:
      - mariadb
    ports:
      - 5000:5000 
    volumes:
      - ./backend:/app

  mariadb:
    image: mariadb:10.6.20
    container_name: washworld_mariadb
    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: washworld
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - 3306:3306

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: washworld_phpmyadmin
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      MYSQL_ROOT_PASSWORD: password
    ports:
      - 8080:80

volumes:
  mariadb_data: